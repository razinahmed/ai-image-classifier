<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

      body, svg { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

      .bg-dark { fill: #0d1117; }
      .bg-card { fill: #161b22; }
      .text-primary { fill: #e6edf3; font-size: 14px; }
      .text-secondary { fill: #8b949e; font-size: 13px; }
      .text-header { fill: #e6edf3; font-size: 28px; font-weight: 700; }
      .text-subheader { fill: #e6edf3; font-size: 16px; font-weight: 600; }
      .text-small { fill: #8b949e; font-size: 12px; }
      .text-label { fill: #7c3aed; font-size: 12px; font-weight: 600; }
      .color-green { fill: #00d4aa; }
      .color-purple { fill: #7c3aed; }
      .color-amber { fill: #f59e0b; }
      .border-dashed { stroke: #30363d; stroke-width: 2; stroke-dasharray: 5,5; fill: none; }
      .shadow { filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.3)); }
    </style>

    <!-- Shadow filter -->
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.25"/>
    </filter>

    <!-- Gradient for progress bars -->
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b894;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main Background -->
  <rect width="1200" height="700" class="bg-dark"/>

  <!-- Header Bar -->
  <rect width="1200" height="70" class="bg-card" filter="url(#cardShadow)"/>

  <!-- Brain Icon (simplified) -->
  <g transform="translate(25, 20)">
    <!-- Brain outline -->
    <circle cx="15" cy="12" r="4" class="color-purple" fill="none" stroke-width="1.5"/>
    <circle cx="25" cy="12" r="4" class="color-purple" fill="none" stroke-width="1.5"/>
    <path d="M 15 16 Q 15 22, 20 24 Q 25 22, 25 16" class="color-purple" fill="none" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="20" cy="18" r="2" class="color-purple"/>
  </g>

  <!-- Header Title -->
  <text x="55" y="48" class="text-header">AI Image Classifier</text>

  <!-- Divider line -->
  <line x1="0" y1="70" x2="1200" y2="70" stroke="#30363d" stroke-width="1"/>

  <!-- Left Panel: Upload Area -->
  <g>
    <!-- Card background -->
    <rect x="30" y="95" width="520" height="590" rx="12" class="bg-card" filter="url(#cardShadow)"/>

    <!-- Upload area with dashed border -->
    <rect x="50" y="120" width="480" height="360" rx="8" class="border-dashed"/>

    <!-- Cloud Upload Icon -->
    <g transform="translate(290, 200)">
      <!-- Cloud shape -->
      <path d="M -15 5 Q -20 0, -15 -5 Q -20 -15, -5 -18 Q 0 -25, 10 -22 Q 18 -25, 18 -12 Q 25 -10, 25 0 Q 25 10, 15 12 L -15 12 Q -25 10, -25 0 Q -25 -8, -15 5 Z"
            fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Arrow down -->
      <line x1="0" y1="-3" x2="0" y2="8" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
      <polygon points="0,8 -3,5 3,5" fill="#7c3aed"/>
    </g>

    <!-- Upload text -->
    <text x="290" y="305" class="text-subheader" text-anchor="middle">Drop image here or click to upload</text>

    <!-- Subtitle -->
    <text x="290" y="330" class="text-secondary" text-anchor="middle">Supports JPG, PNG, WEBP</text>

    <!-- "Classify Another" Button -->
    <rect x="80" y="650" width="460" height="18" rx="6" class="color-green" opacity="0.15"/>
    <rect x="80" y="650" width="460" height="18" rx="6" fill="none" stroke="#00d4aa" stroke-width="1.5"/>
    <text x="310" y="661" class="text-primary" text-anchor="middle" font-weight="600" fill="#00d4aa">Classify Another</text>
  </g>

  <!-- Right Panel: Results -->
  <g>
    <!-- Card background -->
    <rect x="650" y="95" width="520" height="590" rx="12" class="bg-card" filter="url(#cardShadow)"/>

    <!-- Image Placeholder -->
    <rect x="670" y="115" width="480" height="140" rx="8" fill="#30363d" filter="url(#cardShadow)"/>

    <!-- Landscape icon in placeholder -->
    <g transform="translate(885, 170)">
      <!-- Mountains -->
      <polygon points="-35,15 -20,-10 -5,15" fill="none" stroke="#8b949e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Sun -->
      <circle cx="25" cy="-5" r="6" fill="none" stroke="#8b949e" stroke-width="2"/>
    </g>

    <!-- Results Heading -->
    <text x="670" y="285" class="text-subheader">Classification Results</text>

    <!-- Result 1: Golden Retriever (94.2%) -->
    <g>
      <text x="670" y="330" class="text-primary" font-weight="500">Golden Retriever</text>
      <text x="1130" y="330" class="text-primary" text-anchor="end" font-weight="600" fill="#00d4aa">94.2%</text>

      <!-- Progress bar background -->
      <rect x="670" y="337" width="460" height="8" rx="4" fill="#30363d"/>
      <!-- Progress bar fill -->
      <rect x="670" y="337" width="433.2" height="8" rx="4" fill="url(#greenGradient)"/>
    </g>

    <!-- Result 2: Labrador Retriever (3.1%) -->
    <g>
      <text x="670" y="375" class="text-secondary">Labrador Retriever</text>
      <text x="1130" y="375" class="text-secondary" text-anchor="end">3.1%</text>

      <!-- Progress bar background -->
      <rect x="670" y="382" width="460" height="6" rx="3" fill="#30363d"/>
      <!-- Progress bar fill -->
      <rect x="670" y="382" width="14.26" height="6" rx="3" fill="#00d4aa" opacity="0.6"/>
    </g>

    <!-- Result 3: Cocker Spaniel (1.2%) -->
    <g>
      <text x="670" y="420" class="text-secondary">Cocker Spaniel</text>
      <text x="1130" y="420" class="text-secondary" text-anchor="end">1.2%</text>

      <!-- Progress bar background -->
      <rect x="670" y="427" width="460" height="6" rx="3" fill="#30363d"/>
      <!-- Progress bar fill -->
      <rect x="670" y="427" width="5.52" height="6" rx="3" fill="#00d4aa" opacity="0.5"/>
    </g>

    <!-- Result 4: Irish Setter (0.8%) -->
    <g>
      <text x="670" y="465" class="text-secondary">Irish Setter</text>
      <text x="1130" y="465" class="text-secondary" text-anchor="end">0.8%</text>

      <!-- Progress bar background -->
      <rect x="670" y="472" width="460" height="6" rx="3" fill="#30363d"/>
      <!-- Progress bar fill -->
      <rect x="670" y="472" width="3.68" height="6" rx="3" fill="#00d4aa" opacity="0.4"/>
    </g>

    <!-- Result 5: Beagle (0.4%) -->
    <g>
      <text x="670" y="510" class="text-secondary">Beagle</text>
      <text x="1130" y="510" class="text-secondary" text-anchor="end">0.4%</text>

      <!-- Progress bar background -->
      <rect x="670" y="517" width="460" height="6" rx="3" fill="#30363d"/>
      <!-- Progress bar fill -->
      <rect x="670" y="517" width="1.84" height="6" rx="3" fill="#00d4aa" opacity="0.3"/>
    </g>

    <!-- Model Info -->
    <g>
      <text x="670" y="575" class="text-secondary" font-size="12">Model: ResNet-50 • Confidence: High</text>
      <text x="670" y="595" class="text-secondary" font-size="12">Processing time: 245ms • Accuracy: 99.7%</text>
    </g>
  </g>

  <!-- Subtle grid background pattern (optional enhancement) -->
  <defs>
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="0.5"/>
    </pattern>
  </defs>
</svg>